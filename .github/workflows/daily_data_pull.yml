name: Daily Market Data Pull

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated version (No more warning!)
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated version (No more warning!)
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas python-dotenv

      - name: Run script
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: python fetch_market_data.py

      - name: Commit and push changes
        env:
          # This uses your personal token which has "Owner" rights
          PERSONAL_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
        run: |
          git config --global user.name "Tanya Rofani"
          git config --global user.email "your-email@example.com"
          git add NVDA_market_data.csv
          git commit -m "auto: update market data" || exit 0
          # We use your PAT to bypass the 128 error
          git push https://x-access-token:${{ secrets.PERSONAL_TOKEN }}@://github.com{{ github.repository }}.git HEAD:main
