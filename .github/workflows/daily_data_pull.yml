name: Daily Market Data Pull

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight every day
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas python-dotenv

      - name: Run script
        run: python fetch_market_data.py

      - name: Commit and push changes
        run: |
          # 1. Bypass "Safe Directory" restrictions
          git config --global --add safe.directory /github/workspace
          
          # 2. Setup professional identity
          git config --global user.name "Tanya Rofani Automation"
          git config --global user.email "tanya-action@github.com"
          
          # 3. Handle the commit (exit 0 if no changes to prevent a "failure")
          git add NVDA_market_data.csv
          git commit -m "auto: periodic data update [skip ci]" || exit 0
          
          # 4. Use the built-in token with a direct push URL
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}.git HEAD:main


