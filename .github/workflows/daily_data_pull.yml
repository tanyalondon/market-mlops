name: Daily Market Data Pull

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight every day
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas python-dotenv

      - name: Run script
        run: python fetch_market_data.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Uses the built-in token
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add NVDA_market_data.csv
          # The '|| exit 0' ensures it doesn't fail if the data hasn't changed
          git commit -m "auto: update market data" || exit 0
          # This line uses the token to force the push
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}.git main


